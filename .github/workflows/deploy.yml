name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql
          coverage: none

      # 3. Cache & install Composer dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      # 4. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 5. Install npm dependencies & build
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # 6. Prepare production index.php
      - name: Prepare production index.php
        run: cp public/index.php.production public/index.php

      # 7. Create deployment archives
      - name: Create app archive
        run: |
          tar czf deploy-app.tar.gz \
            app/ bootstrap/ config/ database/ routes/ vendor/ \
            resources/views/ \
            artisan composer.json composer.lock

      - name: Create public archive
        run: cd public && shopt -s dotglob && tar czf ../deploy-public.tar.gz *

      # 8. Upload archives via FTP
      - name: Upload files via FTP
        run: |
          upload() {
            curl --ftp-pasv --insecure \
              --user "$FTP_USER:$FTP_PASS" \
              --connect-timeout 30 \
              --max-time 600 \
              --retry 3 \
              --retry-delay 15 \
              --retry-connrefused \
              -T "$1" "ftp://$FTP_HOST/$1"
          }
          upload public/deploy-webhook.php
          upload deploy-app.tar.gz
          upload deploy-public.tar.gz
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}

      # 9. Trigger deploy webhook to extract archives
      - name: Run deploy webhook
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://sianggar.yapinet.id/deploy-webhook.php" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 300)
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "Deploy webhook failed with HTTP $http_code"
            exit 1
          fi
