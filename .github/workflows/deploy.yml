name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql
          coverage: none

      # 3. Cache & install Composer dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      # 4. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 5. Install npm dependencies & build
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # 6. Prepare production index.php
      - name: Prepare production index.php
        run: cp public/index.php.production public/index.php

      # 7. Create deployment archives
      - name: Create app archive
        run: tar czf deploy-app.tar.gz app/ bootstrap/ config/ database/ resources/ routes/ storage/ vendor/ artisan composer.json composer.lock

      - name: Create public archive
        run: cd public && shopt -s dotglob && tar czf ../deploy-public.tar.gz *

      # 8. Upload archives via FTP (only 2 files = reliable)
      - name: Install lftp
        run: sudo apt-get install -y -qq lftp

      - name: Upload files via FTP
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST" <<SCRIPT
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set net:timeout 120
          set net:max-retries 10
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 2
          put public/deploy-webhook.php
          put deploy-app.tar.gz
          put deploy-public.tar.gz
          quit
          SCRIPT
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}

      # 9. Trigger deploy webhook to extract archives
      - name: Run deploy webhook
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://sianggar.yapinet.id/deploy-webhook.php" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 300)
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "Deploy webhook failed with HTTP $http_code"
            exit 1
          fi
