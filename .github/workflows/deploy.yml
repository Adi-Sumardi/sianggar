name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql
          coverage: none

      # 3. Install Composer dependencies
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      # 4. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 5. Install npm dependencies & build
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # 6. Prepare production index.php
      - name: Prepare production index.php
        run: cp public/index.php.production public/index.php

      # 7. Deploy app files via FTP to ~/domains/sianggar.yapinet.id/sianggar/
      - name: Deploy app files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: ./domains/sianggar.yapinet.id/sianggar/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            public/**
            tests/**
            .env
            .env.*
            .github/**
            README.md
            vite.config.*
            tsconfig.*
            postcss.config.*
            tailwind.config.*
            eslint.config.*
            package.json
            package-lock.json
            phpunit.xml

      # 8. Deploy public files via FTP to ~/domains/sianggar.yapinet.id/public_html/
      - name: Deploy public files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./public/
          server-dir: ./domains/sianggar.yapinet.id/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            index.php.production

      # 9. Trigger deploy commands via HTTPS webhook
      - name: Run post-deploy commands
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://sianggar.yapinet.id/deploy-webhook.php" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 120)
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "Deploy webhook failed with HTTP $http_code"
            exit 1
          fi
