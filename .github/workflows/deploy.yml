name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql
          coverage: none

      # 3. Install Composer dependencies
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      # 4. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 5. Install npm dependencies & build
      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # 6. Prepare production index.php
      - name: Prepare production index.php
        run: cp public/index.php.production public/index.php

      # 7. Install lftp
      - name: Install lftp
        run: sudo apt-get install -y lftp

      # 8. Deploy app files via FTP (lftp with parallel upload & auto-reconnect)
      - name: Deploy app files via FTP
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST" <<SCRIPT
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set mirror:parallel-transfer-count 5
          mirror -R --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob node_modules/ --exclude-glob public/ --exclude-glob tests/ --exclude-glob .env --exclude-glob .env.* --exclude-glob README.md --exclude-glob vite.config.* --exclude-glob tsconfig.* --exclude-glob postcss.config.* --exclude-glob tailwind.config.* --exclude-glob eslint.config.* --exclude-glob package.json --exclude-glob package-lock.json --exclude-glob phpunit.xml . ./domains/sianggar.yapinet.id/sianggar
          quit
          SCRIPT
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}

      # 9. Deploy public files via FTP
      - name: Deploy public files via FTP
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST" <<SCRIPT
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set mirror:parallel-transfer-count 5
          mirror -R --verbose --exclude-glob index.php.production public/ ./domains/sianggar.yapinet.id/public_html
          quit
          SCRIPT
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}

      # 10. Trigger deploy commands via HTTPS webhook
      - name: Run post-deploy commands
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://sianggar.yapinet.id/deploy-webhook.php" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 120)
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "Deploy webhook failed with HTTP $http_code"
            exit 1
          fi
