<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accent" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#DBEAFE" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative arc -->
  <path d="M80 380 Q256 320 432 380" stroke="white" stroke-opacity="0.15" stroke-width="40" fill="none" stroke-linecap="round"/>
  <!-- Document icon shape -->
  <rect x="148" y="100" width="216" height="280" rx="24" fill="white" fill-opacity="0.2"/>
  <rect x="156" y="108" width="200" height="264" rx="20" fill="white" fill-opacity="0.15"/>
  <!-- S letter -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="220" font-weight="800" fill="url(#accent)">S</text>
  <!-- Bottom bar lines representing budget rows -->
  <rect x="176" y="360" width="160" height="6" rx="3" fill="white" fill-opacity="0.4"/>
  <rect x="196" y="376" width="120" height="6" rx="3" fill="white" fill-opacity="0.25"/>
</svg>
